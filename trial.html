<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet AI Talk | Happy Paws Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root { 
            --primary: #FF7033; 
            --primary-light: #FFEDE5;
            --secondary: #1A1C1E; 
            --bg-gradient: linear-gradient(135deg, #FFF5F0 0%, #F0F4FF 100%);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            color: var(--secondary);
        }

        /* --- GLASSMORPHISM CARD --- */
        .ai-wrapper { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        .chat-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            display: flex;
            height: 750px;
            overflow: hidden;
            animation: slideInUp 0.8s ease-out;
        }

        /* Sidebar - Sidebar Questions */
        .sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.4);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .pet-toggle-box {
            background: #fff;
            padding: 8px;
            border-radius: 25px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .pet-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            background: transparent;
            font-weight: 800;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pet-btn.active { background: var(--primary); color: white; transform: scale(1.05); box-shadow: 0 10px 20px rgba(255, 112, 51, 0.3); }

        .question-list { overflow-y: auto; flex: 1; padding-right: 5px; }
        .question-list::-webkit-scrollbar { width: 4px; }
        .question-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .q-card {
            background: white;
            padding: 14px 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .q-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            color: var(--primary);
        }

        /* Chat Window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.2); }
        .chat-header { 
            padding: 25px 30px; 
            background: rgba(255,255,255,0.5); 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-body { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }

        /* Message Bubbles */
        .msg { padding: 16px 22px; border-radius: 28px; font-size: 15px; line-height: 1.6; position: relative; max-width: 85%; }
        
        .bot-msg { 
            background: white; 
            align-self: flex-start; 
            border-bottom-left-radius: 5px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.03);
        }

        .user-msg { 
            background: var(--primary); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 5px;
            box-shadow: 0 15px 30px rgba(255, 112, 51, 0.2);
        }

        /* Typing Animation */
        .typing { display: none; font-style: italic; font-size: 12px; color: #888; margin-bottom: 10px; }

        .input-footer { padding: 25px; background: white; border-top: 1px solid #eee; display: flex; gap: 15px; align-items: center; }
        .input-field { 
            flex: 1; 
            border: 2px solid #f0f0f0; 
            padding: 14px 25px; 
            border-radius: 30px; 
            outline: none; 
            transition: 0.3s;
            font-weight: 600;
        }
        .input-field:focus { border-color: var(--primary); background: #fff; }

        .btn-send { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 112, 51, 0.3);
        }
        .btn-send:hover { transform: rotate(15deg) scale(1.1); background: var(--secondary); }

    </style>
</head>
<body>

<div class="ai-wrapper">
    <div class="text-center mb-5">
        <span class="badge rounded-pill px-3 py-2 mb-2" style="background: var(--primary-light); color: var(--primary); font-weight: 800;">PET CARE 2.0</span>
        <h1 class="display-5 fw-800">Talk to <span style="color:var(--primary)">Pet AI</span></h1>
    </div>

    <div class="chat-container">
        <div class="sidebar">
            <div class="pet-toggle-box">
                <button class="pet-btn active" id="dogBtn" onclick="togglePet('Dog')">🐶 Dog</button>
                <button class="pet-btn" id="catBtn" onclick="togglePet('Cat')">🐱 Cat</button>
            </div>

            <div class="question-list" id="qList">
                </div>
        </div>

        <div class="chat-window">
            <div class="chat-header">
                <div class="d-flex align-items-center gap-3">
                    <div id="avatar" style="font-size: 45px; background: white; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">🐶</div>
                    <div>
                        <h5 class="mb-0 fw-800" id="petTitle">Dog Expert</h5>
                        <div class="d-flex align-items-center gap-1">
                            <span style="width: 8px; height: 8px; background: #2ecc71; border-radius: 50%;"></span>
                            <small class="text-muted fw-bold">Active Now</small>
                        </div>
                    </div>
                </div>
                <button class="btn btn-light rounded-pill px-3 fw-bold border-0 shadow-sm" onclick="location.reload()"><i class="fa-solid fa-rotate-right me-2"></i>Reset</button>
            </div>

            <div class="chat-body" id="chatBody">
                <div class="msg bot-msg animate__animated animate__fadeInLeft">
                    👋 Woof! I'm your <b>Pet Assistant</b>. Pick a question on the left or type your own. I know everything about my health and food!
                </div>
            </div>

            <div class="px-4"><div id="typing" class="typing">AI is typing...</div></div>

            <div class="input-footer">
                <input type="text" id="userInput" class="input-field" placeholder="Type a message...">
                <button class="btn-send" onclick="sendManual()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    let pet = "Dog";
    const questions = [
        "What should I feed my [PET]?",
        "How do I train my [PET]?",
        "How often to bathe my [PET]?",
        "Are chocolates safe for [PET]s?",
        "Stop my [PET] from biting?",
        "Why is my [PET] shedding?",
        "Best exercise for my [PET]?",
        "Clean my [PET]'s teeth?",
        "Fruits safe for my [PET]?",
        "Is my [PET] feeling sick?"
    ];

    const brain = {
        "Dog": {
            "What should I feed my Dog?": "Protein is key! Chicken, kibble, and safe veggies. No grapes or onions! 🍖",
            "How do I train my Dog?": "Consistency + Treats. Use short 10-min sessions daily! 🦴",
            "How often to bathe my Dog?": "Once a month is perfect to keep natural oils healthy! 🧼",
            "Are chocolates safe for Dogs?": "NEVER! Chocolate is highly toxic to us dogs. 🚫🍫",
            "Stop my Dog from biting?": "Use chew toys. If I bite, stop the play immediately! 🧸",
            "Why is my Dog shedding?": "Normal behavior, but daily brushing helps reduce hair on sofa! 🐕",
            "Best exercise for my Dog?": "A 30-min walk or fetch in the park keeps me happy! 🏃‍♂️",
            "Clean my Dog's teeth?": "Dental chews or dog-friendly toothpaste. No human paste! 🦷",
            "Fruits safe for my Dog?": "Apples, Bananas, and Watermelon are my favorites! 🍎",
            "Is my Dog feeling sick?": "If I'm lazy or don't eat, please call the Vet! 🌡️"
        },
        "Cat": {
            "What should I feed my Cat?": "I'm a meat eater! Wet food or fish is best for my hydration. 🐟",
            "How do I train my Cat?": "Good luck! Just kidding—use clicker training and tuna. 😼",
            "How often to bathe my Cat?": "Almost never. I am a self-cleaning machine! 🚿",
            "Are chocolates safe for Cats?": "Absolutely not. Keep all sweets away from me. 🚫",
            "Stop my Cat from biting?": "Don't use hands to play. Use feathers or laser toys! 🪶",
            "Why is my Cat shedding?": "I'm just refreshing my coat. Brush me weekly to avoid hairballs! 🧶",
            "Best exercise for my Cat?": "Vertical climbing and midnight zoomies! 🏰",
            "How do I clean my Cat's teeth?": "Dental treats are easiest. Most cats hate brushes! 🦷",
            "Fruits safe for my Cat?": "Blueberries or small melon bits. Most cats dislike fruit. 🫐",
            "Is my Cat feeling sick?": "If I hide all day or stop grooming, I'm not feeling well. 🏥"
        }
    };

    function render() {
        const list = document.getElementById('qList');
        list.innerHTML = "";
        questions.forEach(q => {
            const dq = q.replace("[PET]", pet);
            const div = document.createElement('div');
            div.className = "q-card animate__animated animate__fadeInLeft";
            div.innerHTML = `<i class="fa-solid fa-paw text-primary opacity-50"></i> ${dq}`;
            div.onclick = () => ask(dq);
            list.appendChild(div);
        });
    }

    function togglePet(p) {
        pet = p;
        document.getElementById('dogBtn').classList.toggle('active', p==='Dog');
        document.getElementById('catBtn').classList.toggle('active', p==='Cat');
        document.getElementById('petTitle').innerText = p + " Expert";
        document.getElementById('avatar').innerText = (p==='Dog')?'🐶':'🐱';
        document.getElementById('chatBody').innerHTML = `<div class="msg bot-msg">Mode switched to <b>${p}</b>. Ask me anything!</div>`;
        render();
    }

    function ask(q) {
        addMsg(q, 'user-msg');
        document.getElementById('typing').style.display = "block";
        
        setTimeout(() => {
            document.getElementById('typing').style.display = "none";
            const reply = brain[pet][q] || "I'm still learning that. Try the buttons!";
            addMsg(reply, 'bot-msg');
        }, 1000);
    }

    function sendManual() {
        const input = document.getElementById('userInput');
        if(!input.value.trim()) return;
        addMsg(input.value, 'user-msg');
        input.value = "";
        
        document.getElementById('typing').style.display = "block";
        setTimeout(() => {
            document.getElementById('typing').style.display = "none";
            addMsg("I'm a specific assistant. Please use the questions on the left for expert advice! 🐾", 'bot-msg');
        }, 1000);
    }

    function addMsg(txt, type) {
        const body = document.getElementById('chatBody');
        const d = document.createElement('div');
        d.className = `msg ${type} animate__animated animate__zoomIn`;
        d.innerHTML = txt;
        body.appendChild(d);
        body.scrollTop = body.scrollHeight;
    }

    render();
</script>

</body>
</html>
